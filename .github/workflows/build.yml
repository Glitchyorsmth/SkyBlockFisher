name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d= -f2 | tr -d ' ')
          echo "mod_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Generate release body
        run: |
          # Start with header
          cat > /tmp/release_body.md << 'HEADER'
          ## Download
          Grab the `.jar` file below and drop it in your mods folder.

          **Requirements:**
          - Minecraft 1.21.10 with Fabric Loader
          - [Fabric API](https://modrinth.com/mod/fabric-api) in your mods folder

          **Usage:** Right Shift → Open GUI | F6 → Toggle fishing

          ## What's New
          HEADER

          # Add changelog
          if [ -f CHANGELOG.md ]; then
            awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md >> /tmp/release_body.md
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges >> /tmp/release_body.md
            else
              git log --pretty=format:"- %s" --no-merges -20 >> /tmp/release_body.md
            fi
          fi

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SkyBlockFisher
          path: build/libs/SkyBlockFisher-*.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SkyBlock Fisher ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_body.md
          files: build/libs/SkyBlockFisher-${{ steps.version.outputs.mod_version }}.jar
